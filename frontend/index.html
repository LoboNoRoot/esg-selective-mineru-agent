<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESG Miner</title>
  <style>
    :root{--ink:#171717;--text:#252a31;--muted:#6b7280;--blue:#0f6bff;--blue-soft:#eaf2ff;--bg:#f7f8fa;--surface:#fff;--line:#e5e7eb;--line-strong:#cfd5df;--green:#16803c;--green-soft:#e8f7ee;--amber:#b7791f;--amber-soft:#fff6df;--red:#c62828;--red-soft:#fdecec;--radius:8px;--sidebar:248px}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Inter,"Segoe UI","Microsoft YaHei",system-ui,sans-serif;letter-spacing:0}button,input,select,textarea{font:inherit}button{cursor:pointer}button:disabled{cursor:not-allowed;opacity:.55}
    .shell{min-height:100vh;display:grid;grid-template-rows:64px 1fr}.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:22px;padding:0 24px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.95);backdrop-filter:blur(14px)}
    .brand{display:flex;align-items:center;gap:10px;min-width:190px;color:var(--ink);font-weight:850}.brand-mark{display:grid;place-items:center;width:34px;height:34px;border-radius:var(--radius);background:var(--ink);color:#fff;font-size:13px}.topnav{display:flex;gap:4px}.nav-btn{border:0;background:transparent;padding:22px 12px 20px;color:var(--muted);font-size:14px;font-weight:750}.nav-btn.active{color:var(--ink);border-bottom:2px solid var(--blue)}
    .top-actions{display:flex;align-items:center;gap:10px;margin-left:auto}.search{width:min(320px,30vw);height:38px;padding:0 12px;border:1px solid var(--line);border-radius:var(--radius);outline:none}.avatar{display:grid;place-items:center;width:38px;height:38px;border-radius:50%;background:var(--ink);color:#fff;font-size:12px;font-weight:850}
    .workspace{display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr)}.sidebar{padding:20px 14px;border-right:1px solid var(--line);background:var(--surface)}.side-label{margin:6px 12px 10px;color:var(--muted);font-size:11px;font-weight:850;text-transform:uppercase}.side-nav{display:grid;gap:4px}.side-nav button{display:flex;align-items:center;gap:10px;min-height:42px;padding:0 12px;border:0;border-radius:var(--radius);background:transparent;color:var(--muted);font-size:14px;font-weight:750;text-align:left}.side-nav button.active,.side-nav button:hover{background:var(--blue-soft);color:var(--ink)}
    .main{min-width:0;padding:28px}.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;max-width:1500px;margin:0 auto 22px}.eyebrow{margin:0 0 8px;color:var(--blue);font-size:12px;font-weight:850;text-transform:uppercase}h1{margin:0;color:var(--ink);font-size:clamp(28px,4vw,42px);line-height:1.08}.subtitle{max-width:820px;margin:10px 0 0;color:var(--muted);font-size:15px;line-height:1.6}
    .actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.button{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:38px;padding:0 14px;border:1px solid var(--line-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;font-weight:780;white-space:nowrap}.button.primary{border-color:var(--blue);background:var(--blue);color:#fff}.button.danger{border-color:rgba(198,40,40,.28);background:var(--red-soft);color:var(--red)}
    .grid{display:grid;gap:18px;max-width:1500px;margin:0 auto}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.card,.panel{border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:0 1px 2px rgba(20,20,20,.03)}.card{padding:16px}.stat-top{display:flex;align-items:center;justify-content:space-between;gap:12px;color:var(--muted);font-size:13px;font-weight:750}.stat-value{margin:14px 0 8px;color:var(--ink);font-size:30px;font-weight:850}.trend{color:var(--green);font-size:12px;font-weight:850}.trend.warn{color:var(--amber)}
    .panel-header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px;border-bottom:1px solid var(--line)}.panel-title{margin:0;color:var(--ink);font-size:16px;font-weight:850}.panel-subtitle{margin:4px 0 0;color:var(--muted);font-size:13px}
    table{width:100%;border-collapse:collapse}th,td{padding:13px 16px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle;font-size:13px}th{color:var(--muted);font-weight:850;background:#fbfbfc}tbody tr:hover,tbody tr.selected{background:#f1f7ff}.table-wrap{overflow-x:auto}.muted{color:var(--muted)}.strong{font-weight:850;color:var(--ink)}
    .badge{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:24px;padding:0 9px;border-radius:999px;font-size:12px;font-weight:850;white-space:nowrap}.badge.verified{background:var(--green-soft);color:var(--green)}.badge.review{background:var(--amber-soft);color:var(--amber)}.badge.rejected{background:var(--red-soft);color:var(--red)}.badge.neutral{background:#eef2f7;color:#475569}.status-icon{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:50%;font-size:13px;font-weight:900}.status-icon.error{background:var(--red-soft);color:var(--red)}.status-icon.success{background:var(--green-soft);color:var(--green)}.status-icon.running{background:var(--amber-soft);color:var(--amber)}
    .meter{width:68px;height:7px;border-radius:999px;background:#edf0f3;overflow:hidden}.meter span{display:block;height:100%;border-radius:inherit;background:var(--green)}.meter.warn span{background:var(--amber)}.confidence{display:flex;align-items:center;gap:9px;font-weight:850}.filters{display:flex;gap:8px;padding:14px 16px;border-bottom:1px solid var(--line);overflow-x:auto}.chip{min-height:32px;padding:0 12px;border:1px solid var(--line);border-radius:999px;background:var(--surface);color:var(--muted);font-size:13px;font-weight:800}.chip.active{border-color:var(--ink);background:var(--ink);color:#fff}
    .split{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(360px,.65fr);gap:18px;align-items:start}.evidence{position:sticky;top:84px}.evidence-body{padding:16px}.detail-kicker{margin:0 0 7px;color:var(--muted);font-size:12px;font-weight:850;text-transform:uppercase}.detail-title{margin:0 0 4px;color:var(--ink);font-size:20px;font-weight:850}.detail-meta{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 18px;color:var(--muted);font-size:13px}.value-box{display:grid;gap:12px;padding:14px;border:1px solid var(--line);border-radius:var(--radius);background:#fbfbfc}.extracted-value{font-size:26px;font-weight:850;overflow-wrap:anywhere}.evidence-block{margin:16px 0;padding:14px;border-left:3px solid var(--blue);border-radius:0 var(--radius) var(--radius) 0;background:#f6f9fd;color:#334155;line-height:1.65;font-size:14px}
    .form-grid{display:grid;gap:10px;margin-top:12px}.field{display:grid;gap:7px}.field label{font-size:13px;font-weight:850}.field input,.field select,.field textarea{width:100%;min-height:40px;padding:9px 11px;border:1px solid var(--line-strong);border-radius:var(--radius);outline:none}.compare-grid{display:grid;grid-template-columns:340px minmax(0,1fr);gap:18px}.bar{display:flex;align-items:center;gap:10px}.bar-track{flex:1;height:10px;border-radius:999px;background:#edf0f3;overflow:hidden}.bar-fill{height:100%;background:var(--blue)}.empty{padding:28px;color:var(--muted);text-align:center}
    @media(max-width:1180px){.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.split,.compare-grid{grid-template-columns:1fr}.evidence{position:static}}@media(max-width:760px){.topnav,.search{display:none}.workspace{display:block}.sidebar{display:none}.main{padding:18px 14px}.page-header,.panel-header{display:grid}.stats{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const API_BASE = location.origin || "http://127.0.0.1:8000";
    const LOW_CONFIDENCE = 70;
    const views = [["dashboard","总览"],["reports","报告管理"],["review","结果复核"],["compare","指标对比"],["export","导出中心"]];
    const statusLabels = {queued:"已排队",running:"运行中",succeeded:"已完成",failed:"失败",skipped:"已跳过",pending:"待复核",approved:"已确认",rejected:"已驳回",edited:"已修改"};
    const state = {view:"dashboard", jobs:[], selectedJobId:"", results:[], selectedField:"", filter:"all", search:"", message:"上传 ESG 报告 PDF 后，系统会保留历史任务，并支持逐份报告复核和多公司指标对比。", editing:false, draft:{}};
    const $ = (id) => document.getElementById(id);
    const esc = (v) => String(v ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    async function api(path, options){const res=await fetch(`${API_BASE}${path}`,options);if(!res.ok)throw new Error(await res.text()||`HTTP ${res.status}`);return res.json()}
    function fileName(job){return (job?.summary?.filename || job?.pdf_path || "").split(/[\\\\/]/).pop() || "-"}
    function fmtDate(v){try{return v?new Date(v).toLocaleString("zh-CN",{hour12:false}):"-"}catch{return v||"-"}}
    function translateReason(reason){const text=String(reason||"");if(text.includes("legacy social responsibility report")||text.includes("lacks ESG"))return "文档标题为传统社会责任报告，且缺少 ESG 或“环境、社会与治理”标题信号，不满足 60 字段 ESG 抽取流程要求，已跳过。";if(text.includes("supporting statement")||text.includes("assurance report"))return "文档疑似为鉴证声明、补充说明或摘要文件，不是完整 ESG 报告，已跳过 60 字段抽取流程。";if(text.includes("PDF cannot be opened or parsed"))return text.replace("PDF cannot be opened or parsed","PDF 无法打开或解析");return text}
    function statusClass(status){if(["succeeded","approved"].includes(status))return"verified";if(["failed","skipped","rejected"].includes(status))return"rejected";return"review"}
    function icon(status){if(["failed","skipped"].includes(status))return'<span class="status-icon error">×</span>';if(status==="succeeded")return'<span class="status-icon success">✓</span>';if(["running","queued"].includes(status))return'<span class="status-icon running">!</span>';return""}
    function badge(status,label){return `<span class="badge ${statusClass(status)}">${icon(status)}${esc(label||statusLabels[status]||status||"-")}</span>`}
    function confidence(row){const n=Number(row?.confidence||0);return Math.max(0,Math.min(100,Math.round(n<=1?n*100:n)))}
    function reviewStatus(row){return row?.review?.status||"pending"}
    function displayValue(row){const r=row.review||{};const value=r.value??row.value??"";const unit=r.unit??row.unit??"";return [value,unit].filter(Boolean).join(" ")||row.summary||(row.matched?"已匹配，待复核":"未披露")}
    function selectedJob(){return state.jobs.find(j=>j.job_id===state.selectedJobId)||state.jobs[0]}
    function selectedRow(){return state.results.find(r=>r.field_key===state.selectedField)||filteredResults()[0]}
    function filteredResults(){return state.results.filter(row=>{const q=`${row.category} ${row.name_cn} ${row.field_key} ${row.evidence} ${displayValue(row)}`.toLowerCase();const s=reviewStatus(row);return q.includes(state.search.toLowerCase())&&(state.filter==="all"||s===state.filter||(state.filter==="low"&&confidence(row)<LOW_CONFIDENCE))})}
    async function refreshJobs(){const data=await api("/jobs");state.jobs=data.jobs||[];if(!state.selectedJobId&&state.jobs[0])state.selectedJobId=state.jobs[0].job_id;render()}
    async function loadResults(jobId){if(!jobId)return;try{state.results=await api(`/jobs/${jobId}/results`);state.selectedField=state.results[0]?.field_key||""}catch(e){state.results=[];state.selectedField="";const job=selectedJob();if(job?.status==="skipped")state.message=translateReason(job.summary?.reason)}render()}
    async function upload(files){const list=Array.from(files||[]);if(!list.length)return;const form=new FormData();list.forEach(f=>form.append("files",f));state.message=`正在上传 ${list.length} 份报告...`;render();try{const data=await api("/reports/batch?mode=run&use_llm=true",{method:"POST",body:form});await refreshJobs();if(data.jobs?.[0])state.selectedJobId=data.jobs[0].job_id;state.view="reports";state.message=`已创建 ${data.jobs?.length||0} 个任务。每份报告会单独保留、单独复核。`;render()}catch(e){state.message=`上传失败：${e.message}`;render()}}
    async function retry(jobId){try{await api(`/jobs/${jobId}/retry`,{method:"POST"});state.message="任务已重新排队。";await refreshJobs()}catch(e){state.message=`重跑失败：${e.message}`;render()}}
    async function selectJob(jobId, view="review"){state.selectedJobId=jobId;state.view=view;await loadResults(jobId)}
    async function saveReview(fieldKey, patch){const row=state.results.find(r=>r.field_key===fieldKey);if(!row)return;try{await api(`/jobs/${state.selectedJobId}/reviews/${encodeURIComponent(fieldKey)}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:patch.status,value:patch.value??row.review?.value??row.value,unit:patch.unit??row.review?.unit??row.unit,year:patch.year??row.review?.year??row.year,evidence:patch.evidence??row.review?.evidence??row.evidence,reviewer_note:patch.reviewer_note??row.review?.reviewer_note??""})});const currentIndex=state.results.findIndex(r=>r.field_key===fieldKey);await loadResults(state.selectedJobId);const pending=state.results.filter(r=>reviewStatus(r)==="pending"&&r.field_key!==fieldKey);const next=pending.find(r=>state.results.findIndex(x=>x.field_key===r.field_key)>currentIndex)||pending[0];if(next){state.selectedField=next.field_key;state.filter="pending";state.message="已保存复核结果，自动切换到下一条待复核记录。"}else{state.message="已保存复核结果，当前报告没有更多待复核记录。"}state.editing=false;render()}catch(e){state.message=`保存复核失败：${e.message}`;render()}}
    function stats(){const done=state.jobs.filter(j=>j.status==="succeeded").length;const failed=state.jobs.filter(j=>["failed","skipped"].includes(j.status)).length;const pending=state.results.filter(r=>reviewStatus(r)==="pending").length;const avg=state.results.length?Math.round(state.results.reduce((s,r)=>s+confidence(r),0)/state.results.length):0;return{total:state.jobs.length,done,failed,pending,avg}}
    function headerTitle(){return {dashboard:"项目总览",reports:"报告管理",review:"结果复核",compare:"指标对比",export:"导出中心"}[state.view]}
    function jobTable(jobs, withRetry=false){if(!jobs.length)return'<div class="empty">暂无历史任务。请先上传 ESG PDF 报告。</div>';return `<div class="table-wrap"><table><thead><tr><th>报告</th><th>状态</th><th>模式</th><th>更新时间</th><th>原因</th><th>操作</th></tr></thead><tbody>${jobs.map(job=>`<tr class="${state.selectedJobId===job.job_id?'selected':''}" onclick="selectJob('${job.job_id}','review')"><td><div class="strong">${esc(fileName(job))}</div><div class="muted">${job.job_id.slice(0,10)}</div></td><td>${badge(job.status)}</td><td>${esc(job.mode)}</td><td>${esc(fmtDate(job.updated_at))}</td><td class="muted">${esc(translateReason(job.error||job.summary?.reason)||"-")}</td><td>${withRetry?`<button class="button" ${job.status==="running"?"disabled":""} onclick="event.stopPropagation();retry('${job.job_id}')">重跑</button>`:""}</td></tr>`).join("")}</tbody></table></div>`}
    function statsHtml(){const s=stats();return `<section class="stats">${stat("历史报告任务",s.total,"保留所有上传记录")}${stat("已完成",s.done,"可复核 / 可导出")}${stat("失败或跳过",s.failed,"显示中文原因",true)}${stat("当前待复核",s.pending,`平均置信度 ${s.avg}%`)}</section>`}
    function stat(title,value,note,warn=false){return `<article class="card"><div class="stat-top"><span>${title}</span><span class="badge ${warn?'rejected':'verified'}">${warn?'注意':'实时'}</span></div><div class="stat-value">${value}</div><span class="trend ${warn?'warn':''}">${note}</span></article>`}
    function resultTable(){const rows=filteredResults();if(!rows.length)return'<div class="empty">当前报告暂无可展示结果。</div>';return `<div class="table-wrap"><table><thead><tr><th>维度</th><th>指标</th><th>抽取值</th><th>置信度</th><th>复核状态</th></tr></thead><tbody>${rows.map(row=>`<tr class="${selectedRow()?.field_key===row.field_key?'selected':''}" onclick="state.selectedField='${esc(row.field_key)}';state.editing=false;render()"><td><span class="badge neutral">${esc(row.category||"-")}</span></td><td><div class="strong">${esc(row.name_cn||row.field_key)}</div><div class="muted">${esc(row.indicator_type||"")}</div></td><td>${esc(displayValue(row))}</td><td><span class="confidence"><span class="meter ${confidence(row)<LOW_CONFIDENCE?'warn':''}"><span style="width:${confidence(row)}%"></span></span>${confidence(row)}%</span></td><td>${badge(reviewStatus(row))}</td></tr>`).join("")}</tbody></table></div>`}
    function evidenceHtml(){const row=selectedRow();if(!row)return'<aside class="panel evidence"><div class="evidence-body muted">请选择一条字段记录。</div></aside>';const review=row.review||{};const value=state.draft.value??review.value??row.value??"";const unit=state.draft.unit??review.unit??row.unit??"";const year=state.draft.year??review.year??row.year??"";const evidence=state.draft.evidence??review.evidence??row.evidence??"";return `<aside class="panel evidence"><div class="panel-header"><div><h2 class="panel-title">证据预览</h2><p class="panel-subtitle">${esc(row.field_key)}</p></div></div><div class="evidence-body"><p class="detail-kicker">${esc(row.category)} - ${esc(row.indicator_type)}</p><h3 class="detail-title">${esc(row.name_cn)}</h3><p class="detail-meta">${badge(reviewStatus(row))}<span>来源：${esc(row.source_page?`第 ${row.source_page} 页`:row.source_chunk_id||"-")}</span></p><div class="value-box"><span class="detail-kicker">抽取值</span><span class="extracted-value">${esc(displayValue(row))}</span><span class="detail-meta">年份 ${esc(row.year||"-")} / 置信度 ${confidence(row)}%</span></div>${row.source_text_short?`<div class="evidence-block">${esc(row.source_text_short)}</div>`:""}<div class="evidence-block">${esc(row.evidence||row.reason||"暂无证据")}</div>${state.editing?editForm(value,unit,year,evidence):""}<div class="actions" style="margin-top:16px"><button class="button primary" onclick="saveReview('${esc(row.field_key)}',{status:'approved'})">确认</button><button class="button" onclick="${state.editing?`saveEdit('${esc(row.field_key)}')`:"state.editing=true;state.draft={};render()"}">${state.editing?"保存修改":"编辑"}</button><button class="button danger" onclick="saveReview('${esc(row.field_key)}',{status:'rejected'})">驳回</button></div></div></aside>`}
    function editForm(value,unit,year,evidence){return `<div class="form-grid"><div class="field"><label>值</label><input id="editValue" value="${esc(value)}"></div><div class="field"><label>单位</label><input id="editUnit" value="${esc(unit)}"></div><div class="field"><label>年份</label><input id="editYear" value="${esc(year)}"></div><div class="field"><label>证据</label><textarea id="editEvidence" rows="4">${esc(evidence)}</textarea></div></div>`}
    function saveEdit(fieldKey){saveReview(fieldKey,{status:"edited",value:$("editValue").value,unit:$("editUnit").value,year:$("editYear").value,evidence:$("editEvidence").value})}
    async function compareHtml(){return ""}
    function viewHtml(){const job=selectedJob();if(state.view==="dashboard")return `${statsHtml()}<div class="panel"><div class="panel-header"><div><h2 class="panel-title">最近报告</h2><p class="panel-subtitle">点击任意报告可进入单报告复核。</p></div></div>${jobTable(state.jobs.slice(0,8))}</div>`;if(state.view==="reports")return `${statsHtml()}<div class="panel"><div class="panel-header"><div><h2 class="panel-title">历史报告列表</h2><p class="panel-subtitle">每份上传报告都会保留任务、状态、结果和复核记录。</p></div></div>${jobTable(state.jobs,true)}</div>`;if(state.view==="review")return `${statsHtml()}<section class="split"><div class="panel"><div class="panel-header"><div><h2 class="panel-title">单报告复核</h2><p class="panel-subtitle">${esc(job?fileName(job):"请选择报告")}。确认/驳回后会自动跳到下一条待复核。</p></div></div><div class="filters">${[["all","全部"],["pending","待复核"],["approved","已确认"],["rejected","已驳回"],["low","低置信度"]].map(([id,label])=>`<button class="chip ${state.filter===id?'active':''}" onclick="state.filter='${id}';render()">${label}</button>`).join("")}</div>${resultTable()}</div>${evidenceHtml()}</section>`;if(state.view==="compare")return compareView();if(state.view==="export")return exportView();return""}
    function compareView(){const field=state.compareField||state.results[0]?.field_key||"";state.compareField=field;const fields=[...new Map(state.results.map(r=>[r.field_key,r])).values()];const rows=state.results.filter(r=>r.field_key===field);return `${statsHtml()}<section class="compare-grid"><div class="panel"><div class="panel-header"><div><h2 class="panel-title">选择指标</h2><p class="panel-subtitle">当前先对所选报告内指标做展示；选择其他历史报告可切换对比对象。</p></div></div><div class="form-grid"><div class="field"><label>指标</label><select onchange="state.compareField=this.value;render()">${fields.map(r=>`<option value="${esc(r.field_key)}" ${field===r.field_key?"selected":""}>${esc(r.name_cn||r.field_key)}</option>`).join("")}</select></div></div></div><div class="panel"><div class="panel-header"><div><h2 class="panel-title">指标对比</h2><p class="panel-subtitle">后续可扩展为跨所有报告自动聚合；当前展示所选报告同指标数据。</p></div></div>${rows.length?`<div class="table-wrap"><table><thead><tr><th>报告</th><th>值</th><th>单位</th><th>年份</th><th>置信度</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(fileName(selectedJob()))}</td><td>${esc(r.value||r.summary||"-")}</td><td>${esc(r.unit||"-")}</td><td>${esc(r.year||"-")}</td><td>${confidence(r)}%</td></tr>`).join("")}</tbody></table></div>`:'<div class="empty">暂无可对比数据。</div>'}</div></section>`}
    function exportView(){return `${statsHtml()}<div class="panel"><div class="panel-header"><div><h2 class="panel-title">导出中心</h2><p class="panel-subtitle">每份报告单独下载复核后的 CSV。</p></div></div><div class="table-wrap"><table><thead><tr><th>报告</th><th>状态</th><th>导出</th></tr></thead><tbody>${state.jobs.map(job=>`<tr><td>${esc(fileName(job))}</td><td>${badge(job.status)}</td><td><button class="button" ${job.status!=="succeeded"?"disabled":""} onclick="window.open('${API_BASE}/jobs/${job.job_id}/export.csv','_blank')">下载 CSV</button></td></tr>`).join("")}</tbody></table></div></div>`}
    function render(){document.getElementById("app").innerHTML=`<div class="shell"><header class="topbar"><div class="brand"><span class="brand-mark">ESG</span><span>ESG Miner</span></div><nav class="topnav">${views.map(([id,label])=>`<button class="nav-btn ${state.view===id?'active':''}" onclick="state.view='${id}';render()">${label}</button>`).join("")}</nav><div class="top-actions"><input class="search" value="${esc(state.search)}" placeholder="搜索指标、证据、字段" oninput="state.search=this.value;render()"><div class="avatar">ESG</div></div></header><div class="workspace"><aside class="sidebar"><p class="side-label">工作区</p><nav class="side-nav">${views.map(([id,label])=>`<button class="${state.view===id?'active':''}" onclick="state.view='${id}';render()">${label}</button>`).join("")}</nav></aside><main class="main"><section class="page-header"><div><p class="eyebrow">ESG 报告智能抽取系统</p><h1>${esc({dashboard:"项目总览",reports:"报告管理",review:"结果复核",compare:"指标对比",export:"导出中心"}[state.view])}</h1><p class="subtitle">${esc(state.message)}</p></div><div class="actions"><input id="fileInput" type="file" accept="application/pdf,.pdf" multiple hidden onchange="upload(this.files)"><button class="button primary" onclick="document.getElementById('fileInput').click()">上传多份报告</button></div></section><div class="grid">${viewHtml()}</div></main></div></div>`}
    window.state=state;window.render=render;window.upload=upload;window.retry=retry;window.selectJob=selectJob;window.saveReview=saveReview;window.saveEdit=saveEdit;
    render();refreshJobs().then(()=>selectedJob()&&loadResults(selectedJob().job_id)).catch(e=>{state.message=`读取历史任务失败：${e.message}`;render()});
    setInterval(()=>refreshJobs().catch(()=>{}),4000);
  </script>
</body>
</html>
